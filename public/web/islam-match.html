<script language=javascript><!--
//DECLARATION OF GLOBAL VARIABLES AND ARRAYS
var theRightSelection='';
var theLeftSelection='';
var theColorIndicator='ffffdd';
var theTableColor='green'
var theIncorrectCount=0
var theCorrecCount=0

QuestionsArray=new Array()
QuestionsArray[0]=["Creed","Kalima"];
QuestionsArray[1]=["Prayer","Salat"];
QuestionsArray[2]=["Fasting","Ramadaan"];
QuestionsArray[3]=["Pilgrimage","Hajj"];
QuestionsArray[4]=["Charity","Zakat"];

LeftArray=new Array();
RightArray=new Array();

for (q in QuestionsArray) {
    LeftArray[q]  = [QuestionsArray[q][0],''];
    RightArray[q] = [QuestionsArray[q][1],'']; }

//FUNCTION TO RANDOMIZE ARRAYS
Array.prototype.shuffle = function(){
  var len = this.length;
  var rand,temp,i;
  for (i = 0; i < len; i++){
    rand = Math.floor(Math.random()*len);
    temp = this[i];
    this[i] = this[rand];
    this[rand] = temp; }
    }


//FUNCTION TO SETUP THE WEB PAGE ON LOAD
function resetForm() {
LeftArray.shuffle();
RightArray.shuffle();

 txtQuestions.innerHTML = WriteQuestions();

 txtScore.innerText='';
 quizmain.StudentName.focus();

txtScore.innerHTML='<p><br>Remaining Pairs: '+eval(QuestionsArray.length-theCorrecCount)+'&nbsp;&nbsp; Correct Attempts: '+theCorrecCount+'&nbsp;&nbsp; Incorrect Attempts: '+theIncorrectCount+'<br>&nbsp;</p>'; }


//FUNCTION TO WRITE THE QUESTIONS TO THE PAGE
function WriteQuestions(){
var info="";
var theLeftColor='white';
var theRightColor='white';
TempArrayL=new Array();
TempArrayR=new Array();
TempArray=new Array();

for (l in QuestionsArray) { if (LeftArray[l][0]  != null && LeftArray[l][1]=='')  { TempArrayL[TempArrayL.length]=[LeftArray[l][0],l]; } }
for (r in QuestionsArray) { if (RightArray[r][0] != null && RightArray[r][1]=='') { TempArrayR[TempArrayR.length]=[RightArray[r][0],r]; } }
for (f in TempArrayR) { TempArray[TempArray.length]=[TempArrayL[f][0],TempArrayL[f][1],TempArrayR[f][0],TempArrayR[f][1]]; }

info += '<center><br><table style=width:75%;background-color:'+theTableColor+'; border=0 id=theQuestionsTable><col width=49%><col width=2%><col width=49%>'

for (w in TempArray) {
if (theLeftSelection!='' && theLeftSelection==TempArray[w][1]) theLeftColor=theColorIndicator; else theLeftColor='white';
if (theRightSelection!='' && theRightSelection==TempArray[w][3]) theRightColor=theColorIndicator; else theRightColor='white';

if (TempArray[w][0]!=null) {
info += '<tr valign=top>'
info += '<td valign=top style=cursor:pointer;background-color:'+theLeftColor+'; id=theLeft'+TempArray[w][1]+' onclick="SelectLeft(\''+TempArray[w][1]+'\')"><p style=color:000000;text-align:center;>'+TempArray[w][0]+'</p></td>'
info += '<td valign=top><p>&nbsp;</p></td>'
info += '<td valign=top style=cursor:pointer;background-color:'+theRightColor+'; id=theRight'+TempArray[w][3]+' onclick="SelectRight(\''+TempArray[w][3]+'\')"><p style=color:000000;text-align:center;>'+TempArray[w][2]+'</p></td>'
info += '</tr>' }}

info += '</table></center>'

return info; }

//FUNCTION TO SET THE VALUE OF A QUESTION OPTION
function SelectLeft(Number){
  theLeftSelection=Number;
  eval('theLeft'+Number).style.backgroundColor='ffffdd';
  CheckMatch(); }

function SelectRight(Number){
  theRightSelection=Number;
  eval('theRight'+Number).style.backgroundColor='ffffdd';
  CheckMatch(); }

function CheckMatch(){
var aMatch=false;

if (theLeftSelection!='' && theRightSelection!='') {
for (c in QuestionsArray) { if (QuestionsArray[c][0]==LeftArray[theLeftSelection][0] && QuestionsArray[c][1]==RightArray[theRightSelection][0]) aMatch=true; }

if (aMatch) {
theColorIndicator='ffffdd';
theTableColor='green';
LeftArray[theLeftSelection][1]='Matched'
RightArray[theRightSelection][1]='Matched'
theRightSelection='';
theLeftSelection='';
theCorrecCount++; }
else {
theTableColor='maroon';
theColorIndicator='ffdddd';
theIncorrectCount++; } }

txtQuestions.innerHTML = WriteQuestions();
txtScore.innerHTML='<p><br>Remaining Pairs: '+eval(QuestionsArray.length-theCorrecCount)+'&nbsp;&nbsp; Correct Attempts: '+theCorrecCount+'&nbsp;&nbsp; Incorrect Attempts: '+theIncorrectCount+'<br>&nbsp;</p>';

return aMatch; }


//FUNCTION TO PRINT THE QUIZ RESULTS
function printQuiz(){
if (quizmain.StudentName.value=='') { quizmain.StudentName.focus();alert('Please enter your name before printing your quiz.'); }
else { window.print(); } }

// Stop hiding -->
</script><style type='text/css'>
