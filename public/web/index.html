<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1" name="viewport">
  <title>KY Chat</title>
  <style>
    body { background-color: #333; font-size: 1.5em; padding: 0em 0.25em; font-family: monospace; }
    pre { color: #fff; white-space: pre-wrap; word-wrap: break-word; text-shadow: 0 0 10px #ccc; margin: 0; }
    #log { min-height: 200px; margin-bottom: 20px; }
    #input { border-bottom: 1px solid #ccc; background-color: #383838; padding: 0.25em; outline: 0; color: #fff; }
    #input::before { content: "> "; color: #50fa7b; }
  </style>
  <script>
    function log(message) {
      document.getElementById("log").textContent += message + "\n";
    }
  </script>
  <!-- Loading Bugout library -->
  <script src="https://chr15m.github.io/bugout/bugout.min.js" type="application/javascript"></script>
</head>
<body>
  <pre id="log"></pre>
  <div id="input" contenteditable="true"></div>

<script>
  log("Bismillah! السلام عليكم ورحمة الله وبركاته - KY Chat");

  // Initialize Bugout with a shared room identifier
  // Note: For a completely private chat room, change "bugout-chat-tutorial" to a unique random phrase.
  var b = Bugout("bugout-chat-tutorial");
  
  // Create a shorter shorthand nickname from the long cryptographic address string
  function getHandle(address) {
    return address.substring(0, 6) + "...";
  }

  log("My Address: " + b.address() + " [ " + getHandle(b.address()) + " ]");

  // Triggered when another user connects to the room
  b.on("seen", function(address) { 
    log("[ System ]: User " + getHandle(address) + " has joined the chat."); 
  });

  // Triggered when another user leaves/disconnects
  b.on("left", function(address) {
    log("[ System ]: User " + getHandle(address) + " has left the chat.");
  });

  // Triggered when a message is received from the network
  b.on("message", function(address, message) {
    log(getHandle(address) + ": " + message);
  });

  // Handle typing and hitting 'Enter' to send
  document.getElementById("input").onkeydown = function(ev) {
    if (ev.keyCode == 13) { // Enter key
      ev.preventDefault(); // Stop a line break from creating inside contenteditable
      
      var msg = ev.target.innerText.trim();
      if (msg.length === 0) return;

      // Broadcast the message to all connected peers in the room
      b.send(msg);
      
      // Since b.send() broadcasts to *others*, manually log our own message locally
      log(getHandle(b.address()) + " (Me): " + msg);
      
      // Clear the input area cleanly
      ev.target.innerText = "";
    }
  }
</script>
</body>
</html>
