<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1" name="viewport">
  <title>KY Chat</title>
  <style>
    body { background-color: #333; font-size: 1.5em; padding: 0em 0.25em; font-family: monospace; }
    pre { color: #fff; white-space: pre-wrap; word-wrap: break-word; text-shadow: 0 0 10px #ccc; margin: 0; }
    #log { min-height: 200px; padding-bottom: 1em; }
    #input { border-bottom: 1px solid #ccc; background-color: #383838; padding: 0.25em; outline: 0; color: #fff; }
    #input::before { content: "> "; color: #aaa; }
  </style>
  <script>
    function log(message) {
      document.getElementById("log").textContent += message + "\n";
      // Auto-scroll to the bottom when new messages arrive
      window.scrollTo(0, document.body.scrollHeight);
    }
  </script>
  <!-- Loading Bugout library -->
  <script src="https://chr15m.github.io/bugout/bugout.min.js" type="application/javascript"></script>
</head>
<body>
  <pre id="log"></pre>
  <pre id="input" contenteditable="true"></pre>

<script>
  log("Bismillah! السلام عليكم ورحمة الله وبركاته - KY Chat");

  // Initialize Bugout instance
  var b = Bugout("bugout-chat-tutorial");
  
  log(b.address() + " [ me ]");

  // Listen for when another peer connects
  b.on("seen", function(address) { 
    log(address + " [ seen ]"); 
  });

  // Listen for incoming messages
  b.on("message", function(address, message) {
    log(address + ": " + message);
  });

  // Handle message sending input
  document.getElementById("input").onkeydown = function(ev) {
    if (ev.key === "Enter" || ev.keyCode === 13) {
      ev.preventDefault(); // Stop the default newline break
      
      var text = ev.target.textContent.trim();
      
      if (text.length > 0) {
        // Send message out to the WebRTC swarm
        b.send(text);
        
        // Locally log your own message so you can see it instantly
        log(b.address() + ": " + text);
        
        // Clear the input box cleanly
        ev.target.textContent = "";
      }
    }
  };
</script>
</body>
</html>
