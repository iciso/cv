<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1" name="viewport">
  <title>KY Chat</title>
  <style>
    body { 
      background-color: #1e1e1e; 
      color: #fff; 
      font-size: 1.1em; 
      padding: 10px; 
      font-family: monospace; 
      margin: 0;
    }
    pre { 
      color: #ddd; 
      white-space: pre-wrap; 
      word-wrap: break-word; 
      margin: 0; 
      padding: 10px; 
      background: #2d2d2d; 
      border-radius: 8px;
      min-height: 300px;
      max-height: 70vh;
      overflow-y: auto;
    }
    #input-container {
      display: flex;
      background-color: #383838;
      padding: 8px;
      border-radius: 8px;
      margin-top: 10px;
      border: 1px solid #555;
    }
    #input { 
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #fff;
      font-family: monospace;
      font-size: 1.1em;
      padding: 4px 8px;
    }
    #status {
      margin: 8px 0;
      font-size: 0.9em;
      color: #4ade80;
    }
  </style>
  <script src="https://chr15m.github.io/bugout/bugout.min.js"></script>
</head>
<body>
  <pre id="log"></pre>
  <div id="status">Connecting to P2P network...</div>
  <div id="input-container">
    <div id="input" contenteditable="true" spellcheck="false"></div>
  </div>

<script>
  const logEl = document.getElementById("log");
  const statusEl = document.getElementById("status");
  const inputEl = document.getElementById("input");

  function log(message, type = "info") {
    const time = new Date().toLocaleTimeString();
    let prefix = `[${time}] `;
    if (type === "system") prefix += "[System] ";
    if (type === "me") prefix += "You: ";
    if (type === "error") prefix += "❌ ";
    
    logEl.textContent += prefix + message + "\n";
    logEl.scrollTop = logEl.scrollHeight; // Auto-scroll
  }

  log("Bismillah! السلام عليكم ورحمة الله وبركاته - KY Chat", "system");

  // Initialize Bugout
  const roomName = "ky-chat-room-2026"; // Change this for a private room
  const b = new Bugout(roomName);

  function getHandle(address) {
    return address ? address.substring(0, 8) + "..." : "Unknown";
  }

  // Wait for Bugout to be ready
  b.on("ready", function() {
    log("Connected to P2P network! Your ID: " + getHandle(b.address()), "system");
    statusEl.textContent = "✅ Connected | Room: " + roomName;
    statusEl.style.color = "#4ade80";
  });

  b.on("seen", function(address) {
    log("User " + getHandle(address) + " joined the chat.", "system");
  });

  b.on("left", function(address) {
    log("User " + getHandle(address) + " left the chat.", "system");
  });

  b.on("message", function(address, message) {
    if (address !== b.address()) { // Don't echo our own messages again
      log(getHandle(address) + ": " + message);
    }
  });

  // Send message on Enter
  inputEl.addEventListener("keydown", function(ev) {
    if (ev.key === "Enter") {
      ev.preventDefault();
      
      const msg = inputEl.innerText.trim();
      if (msg.length === 0) return;

      // Send to peers
      b.send(msg);
      
      // Show locally
      log(msg, "me");
      
      // Clear input
      inputEl.innerText = "";
    }
  });

  // Focus input automatically
  setTimeout(() => inputEl.focus(), 500);

  // Optional: Show debug info
  console.log("Bugout initialized with room:", roomName);
</script>
</body>
</html>
