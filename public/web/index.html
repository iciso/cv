<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1" name="viewport">
  <title>KY Chat</title>
  <style>
    body { 
      background-color: #1e1e1e; 
      color: #fff; 
      font-size: 1.1em; 
      padding: 10px; 
      font-family: monospace; 
      margin: 0;
    }
    #log { 
      color: #ddd; 
      white-space: pre-wrap; 
      word-wrap: break-word; 
      margin: 0; 
      padding: 15px; 
      background: #2d2d2d; 
      border-radius: 8px;
      min-height: 300px;
      max-height: 70vh;
      overflow-y: auto;
      border: 1px solid #444;
    }
    #input-container {
      display: flex;
      background-color: #383838;
      padding: 10px;
      border-radius: 8px;
      margin-top: 10px;
      border: 1px solid #555;
    }
    #input { 
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #fff;
      font-family: monospace;
      font-size: 1.1em;
      padding: 6px 10px;
    }
    #status {
      margin: 8px 0;
      font-size: 0.95em;
    }
    .system { color: #4ade80; }
    .me { color: #60a5fa; }
  </style>
</head>
<body>
  <pre id="log"></pre>
  <div id="status" class="system">Connecting to chat server...</div>
  <div id="input-container">
    <div id="input" contenteditable="true" spellcheck="false" placeholder="Type message and press Enter..."></div>
  </div>

<script>
  const logEl = document.getElementById("log");
  const statusEl = document.getElementById("status");
  const inputEl = document.getElementById("input");

  function log(message, type = "") {
    const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
    let cls = "";
    if (type === "system") cls = "system";
    if (type === "me") cls = "me";
    
    logEl.innerHTML += `<span class="${cls}">[${time}] ${message}</span><br>`;
    logEl.scrollTop = logEl.scrollHeight;
  }

  log("Bismillah! السلام عليكم ورحمة الله وبركاته - KY Chat", "system");

  // === WebSocket Connection ===
  // For testing: using a free public echo server
  // In production, use your own WebSocket server
  let ws = new WebSocket("wss://echo.websocket.events");

  ws.onopen = () => {
    statusEl.textContent = "✅ Connected to KY Chat Server";
    statusEl.className = "system";
    log("Connected successfully! You can now chat.", "system");
  };

  ws.onmessage = (event) => {
    const data = JSON.parse(event.data);
    if (data.type === "message") {
      log(data.handle + ": " + data.text);
    }
  };

  ws.onerror = () => {
    statusEl.textContent = "❌ Connection error. Try refreshing.";
    statusEl.style.color = "#f87171";
  };

  ws.onclose = () => {
    statusEl.textContent = "⚠️ Connection closed. Refresh to reconnect.";
  };

  function getHandle() {
    // Simple handle based on time or you can ask user for name
    return "User" + Math.floor(Math.random()*9999);
  }

  // Send message
  inputEl.addEventListener("keydown", function(ev) {
    if (ev.key === "Enter") {
      ev.preventDefault();
      const msg = inputEl.innerText.trim();
      if (msg.length === 0 || ws.readyState !== WebSocket.OPEN) return;

      const payload = {
        type: "message",
        handle: getHandle(),
        text: msg
      };

      ws.send(JSON.stringify(payload));
      
      // Show our own message
      log("You: " + msg, "me");
      
      inputEl.innerText = "";
    }
  });

  // Auto focus
  setTimeout(() => inputEl.focus(), 300);
</script>
</body>
</html>
