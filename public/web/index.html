<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1" name="viewport">
  <title>KY Chat</title>
  <style>
    body { 
      background-color: #1e1e1e; 
      color: #fff; 
      font-size: 1.1em; 
      padding: 10px; 
      font-family: monospace; 
      margin: 0;
    }
    #log { 
      color: #ddd; 
      white-space: pre-wrap; 
      word-wrap: break-word; 
      margin: 0; 
      padding: 15px; 
      background: #2d2d2d; 
      border-radius: 8px;
      min-height: 300px;
      max-height: 70vh;
      overflow-y: auto;
      border: 1px solid #444;
    }
    #input-container {
      display: flex;
      background-color: #383838;
      padding: 10px;
      border-radius: 8px;
      margin-top: 10px;
      border: 1px solid #555;
    }
    #input { 
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #fff;
      font-family: monospace;
      font-size: 1.1em;
      padding: 6px 10px;
    }
    #status {
      margin: 8px 0;
      font-size: 0.95em;
    }
    .system { color: #4ade80; }
    .me { color: #60a5fa; }
  </style>
</head>
<body>
  <pre id="log"></pre>
  <div id="status" class="system">Connecting to chat server...</div>
  <div id="input-container">
    <div id="input" contenteditable="true" spellcheck="false"></div>
  </div>

<script>
  const logEl = document.getElementById("log");
  const statusEl = document.getElementById("status");
  const inputEl = document.getElementById("input");

  function log(message, type = "") {
    const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
    let cls = "";
    if (type === "system") cls = "system";
    if (type === "me") cls = "me";
    
    logEl.innerHTML += `<span class="${cls}">[${time}] ${message}</span><br>`;
    logEl.scrollTop = logEl.scrollHeight;
  }

  log("Bismillah! السلام عليكم ورحمة الله وبركاته - KY Chat", "system");

  // More reliable public WebSocket echo server
  const wsUrl = "wss://ws.ifelse.io/";
  let ws = new WebSocket(wsUrl);

  ws.onopen = () => {
    statusEl.textContent = "✅ Connected! Start chatting...";
    statusEl.style.color = "#4ade80";
    log("Successfully connected to KY Chat.", "system");
  };

  ws.onmessage = (event) => {
    try {
      const data = JSON.parse(event.data);
      if (data.type === "message") {
        log(data.handle + ": " + data.text);
      }
    } catch(e) {
      log("Received: " + event.data);
    }
  };

  ws.onerror = (err) => {
    console.error(err);
    statusEl.innerHTML = "❌ Connection failed.<br>Try refreshing or check your internet.";
    statusEl.style.color = "#f87171";
  };

  ws.onclose = () => {
    statusEl.innerHTML = "⚠️ Disconnected. Refresh the page to reconnect.";
  };

  function getHandle() {
    return "User-" + Math.floor(1000 + Math.random() * 9000);
  }

  inputEl.addEventListener("keydown", function(ev) {
    if (ev.key === "Enter") {
      ev.preventDefault();
      const msg = inputEl.innerText.trim();
      if (msg.length === 0 || ws.readyState !== WebSocket.OPEN) return;

      const payload = JSON.stringify({
        type: "message",
        handle: getHandle(),
        text: msg
      });

      ws.send(payload);
      log("You: " + msg, "me");
      
      inputEl.innerText = "";
    }
  });

  setTimeout(() => inputEl.focus(), 500);
</script>
</body>
</html>
