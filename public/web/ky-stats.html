<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN" "http://www.w3.org/TR/html4/loose.dtd">
<html><head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<meta name="robots" content="noindex">
<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

        <title>KYFCT Statistics</title>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/2.1.3/jquery.min.js"></script> 
        <script src="https://cdnjs.cloudflare.com/ajax/libs/waypoints/2.0.3/waypoints.min.js"></script> 
        <script src="https://cdn.jsdelivr.net/jquery.counterup/1.0/jquery.counterup.min.js"></script> 
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;800&display=swap" rel="stylesheet">
<style>
body {
    padding: 0;
    margin: 0;
    height: 100vh;
    width: 100vw;
    background-image: -o-linear-gradient(45deg, #003399, #00FFFF);
    background-image: linear-gradient(45deg, #003399, #00FFFF);
}

.container {
    width: 350px;
    height: 350px;
    z-index: 1;
    overflow: hidden;
    background-color: white;
    border-radius: 50%;
    position: absolute;
    margin: auto;
    top: 0;
    bottom: 0;
    left: 0;
    right: 0;
    font-family: 'Poppins', sans-serif;
    -webkit-box-shadow: 0 0 35px rgba(0, 0, 0, 0.35);
    box-shadow: 0 0 35px rgba(0, 0, 0, 0.35);
   
}


.container1 {
    width: 350px;
    height: 350px;
    z-index: 1;
    overflow: hidden;
    background-color: white;
    border-radius: 50%;
    position: absolute;
    margin: auto;
    top: 5;
    bottom: 0;
    left: 400;
    right: 0;
    font-family: 'Poppins', sans-serif;
    -webkit-box-shadow: 0 0 35px rgba(0, 0, 0, 0.35);
    box-shadow: 0 0 35px rgba(0, 0, 0, 0.35);
   
}


.container2 {
    width: 350px;
    height: 350px;
    z-index: 1;
    overflow: hidden;
    background-color: white;
    border-radius: 50%;
    position: absolute;
    margin: auto;
    top: 5;
    bottom: 0;
    left: 0;
    right: 400;
    font-family: 'Poppins', sans-serif;
    -webkit-box-shadow: 0 0 35px rgba(0, 0, 0, 0.35);
    box-shadow: 0 0 35px rgba(0, 0, 0, 0.35);
   
}


h1 {
    display: inline-block;
    font-size: 28px;
    text-align: center;
    width: 60%;
    margin: 65px 20% 20px 20%;
    background-color: #0000FF;
    border-radius: 25px;
    color: white;
    -webkit-animation: expand 1.5s;
    animation: expand 1.5s;
    -webkit-box-shadow: 0 0 15px rgba(0, 0, 0, 0.05);
    box-shadow: 0 0 15px rgba(0, 0, 0, 0.05);
    font-weight: 600;
}

@-webkit-keyframes expand {
    from {
        -webkit-transform: scaleX(0);
        transform: scaleX(0);
    }
    to {
        -webkit-transform: scaleX(1);
        transform: scaleX(1);
    }
}

@keyframes expand {
    from {
        -webkit-transform: scaleX(0);
        transform: scaleX(0);
    }
    to {
        -webkit-transform: scaleX(1);
        transform: scaleX(1);
    }
}

span {
    display: block;
    width: 90%;
    margin-left: 5%;
    text-align: center;
    font-size: 70px;
    color: transparent;
    background-image: -o-linear-gradient(45deg, #95B9C7, #000080);
    background-image: linear-gradient(45deg, #95B9C7, #000080);
    -webkit-background-clip: text;
    font-weight: 800;
    letter-spacing: 2px;
}

h3 {
    font-size: 25px;
    letter-spacing: 0.5px;
    font-weight: 600;
    width: 100%;
    text-align: center;
    margin-top: 0;
    color: #1F232E
}

.heart {
    height: 15px;
    width: 15px;
    background-color: #E41B17;
    position: absolute;
    -webkit-transform: rotate(45deg);
    -ms-transform: rotate(45deg);
    transform: rotate(45deg);
    border-radius: 0 0 5px 0;
}

.heart:before,
.heart:after {
    position: absolute;
    content: "";
    height: 60%;
    width: 100%;
    background-color: #E41B17;
    border-radius: 35px 35px 0 0;
}

.heart:before {
    top: -56%;
}

.heart:after {
    -webkit-transform: rotate(-90deg);
    -ms-transform: rotate(-90deg);
    transform: rotate(-90deg);
    top: 20%;
    right: 76%;
}

.ht1 {
    left: 20px;
    bottom: 0;
    -webkit-animation: float 8s infinite;
    animation: float 8s infinite;
}

.ht2 {
    right: 20px;
    bottom: -20px;
    -webkit-animation: float 6s 1s infinite;
    animation: float 6s 1s infinite;
}

.ht3 {
    left: 80px;
    bottom: -50px;
    -webkit-animation: float 9s 2s infinite;
    animation: float 9s 2s infinite;
}

.ht4 {
    left: 220px;
    bottom: -85px;
    -webkit-animation: float 10s infinite;
    animation: float 10s infinite;
}

.ht5 {
    left: 180px;
    bottom: -150px;
    -webkit-animation: float 8s 3s infinite;
    animation: float 8s 3s infinite;
}

@-webkit-keyframes float {
    100% {
        bottom: 400px;
    }
}

@keyframes float {
    100% {
        bottom: 400px;
    }
}
</style>
    </head>
    <body>
    <div class="container">
        <h1>KYFCT</h1>
        <span class="counter">306</span>
        <h3>MEMBERS</h3>
        <div class="heart ht1"></div>
        <div class="heart ht2"></div>
        <div class="heart ht3"></div>
        <div class="heart ht4"></div>
        <div class="heart ht5"></div>
    </div>
 <div class="container1">
        <h1>KYFCT</h1>
        <span class="counter">25000</span>
        <h3>TAKAFUL</h3>
        <div class="heart ht1"></div>
        <div class="heart ht2"></div>
        <div class="heart ht3"></div>
        <div class="heart ht4"></div>
        <div class="heart ht5"></div>
    </div>
 <div class="container2">
        <h1>KYFCT</h1>
        <span class="counter">400000</span>
        <h3>ZAKAT</h3>
        <div class="heart ht1"></div>
        <div class="heart ht2"></div>
        <div class="heart ht3"></div>
        <div class="heart ht4"></div>
        <div class="heart ht5"></div>
    </div>
    <script>
          $('.counter').counterUp({
            delay: 100,
            time: 15000
        });
    </script>
 
  </body>
</html>
