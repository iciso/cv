<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WHO · COVID-19 & Health Services Quiz</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background: #f0f5fa;
            font-family: 'Inter', -apple-system, sans-serif;
            padding: 1.5rem 1rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .app-container {
            max-width: 820px;
            width: 100%;
            background: white;
            border-radius: 40px;
            box-shadow: 0 20px 50px -10px rgba(0, 20, 40, 0.12);
            padding: 2rem 2.2rem 2.4rem;
            transition: 0.2s;
        }
        .header {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
            border-bottom: 3px solid #e6edf4;
            padding-bottom: 0.8rem;
            margin-bottom: 1.2rem;
        }
        .header img {
            height: 48px;
            width: auto;
        }
        .header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #0a2a3f;
            letter-spacing: -0.02em;
            flex: 1;
            min-width: 180px;
        }
        .header .badge {
            background: #dce8f2;
            color: #1a5a7a;
            font-size: 0.7rem;
            font-weight: 600;
            padding: 0.2rem 1rem;
            border-radius: 60px;
            letter-spacing: 0.3px;
        }
        .quiz-progress {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
            background: #f6faff;
            border-radius: 60px;
            padding: 0.3rem 1.5rem 0.3rem 1.8rem;
            margin-bottom: 1.5rem;
            border: 1px solid #e0eaf2;
        }
        .quiz-progress .counter {
            font-weight: 600;
            color: #1a4058;
            font-size: 0.9rem;
        }
        .quiz-progress .counter strong {
            background: white;
            padding: 0 0.7rem;
            border-radius: 40px;
        }
        .quiz-progress .status-badge {
            font-size: 0.8rem;
            font-weight: 600;
            color: #1a6a7a;
        }
        .slide {
            display: none;
            animation: fadeSlide 0.4s ease;
        }
        .slide.active-slide {
            display: block;
        }
        @keyframes fadeSlide {
            0% { opacity: 0.4; transform: translateY(6px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .question {
            font-size: 1.15rem;
            font-weight: 600;
            color: #0a2a3f;
            margin-bottom: 1.2rem;
            line-height: 1.4;
        }
        .answers {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-bottom: 1.2rem;
            padding-left: 0.5rem;
        }
        .answers label {
            display: flex;
            align-items: center;
            gap: 0.7rem;
            padding: 0.5rem 1rem;
            border-radius: 16px;
            background: #f8fbfe;
            border: 2px solid #e2ebf3;
            cursor: pointer;
            transition: 0.12s;
            font-size: 0.95rem;
            font-weight: 500;
            color: #1a3343;
        }
        .answers label:hover {
            border-color: #8bb3cc;
            background: #f0f7fd;
        }
        .answers label input[type="radio"] {
            accent-color: #1a6a8a;
            width: 18px;
            height: 18px;
            flex-shrink: 0;
            cursor: pointer;
        }
        .answers label .letter {
            font-weight: 700;
            color: #1a5a7a;
            min-width: 22px;
        }
        .answers.correct-highlight label {
            border-color: #309b6b;
            background: #e6f5ef;
        }
        .answers.wrong-highlight label {
            border-color: #c95a66;
            background: #fde9eb;
        }
        .answers.correct-highlight label input[type="radio"],
        .answers.wrong-highlight label input[type="radio"] {
            opacity: 0.7;
        }
        .nav-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
            margin: 0.8rem 0 1rem;
            align-items: center;
        }
        .btn {
            background: white;
            border: 2px solid #d0dce8;
            padding: 0.5rem 1.6rem;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.85rem;
            color: #1a4058;
            cursor: pointer;
            transition: 0.15s;
            letter-spacing: 0.2px;
        }
        .btn:hover {
            background: #eaf1f8;
            border-color: #8aaabc;
            transform: scale(0.97);
        }
        .btn-primary {
            background: #1a5f82;
            border-color: #1a5f82;
            color: white;
        }
        .btn-primary:hover {
            background: #0f4866;
            border-color: #0f4866;
        }
        .btn-success {
            background: #2a7a5a;
            border-color: #2a7a5a;
            color: white;
        }
        .btn-success:hover {
            background: #1d6046;
            border-color: #1d6046;
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .results-box {
            background: #f0f7fe;
            border-radius: 24px;
            padding: 1.2rem 1.8rem;
            margin-top: 1rem;
            border-left: 6px solid #1a6a8a;
            font-size: 1rem;
            font-weight: 500;
            color: #0a2a3f;
            display: none;
        }
        .results-box .score-highlight {
            font-size: 1.4rem;
            font-weight: 700;
            color: #1a5a7a;
        }
        .results-box .perfect {
            color: #1a8a5a;
        }
        .footer {
            margin-top: 2rem;
            border-top: 2px solid #e6edf4;
            padding-top: 1.2rem;
            font-size: 0.8rem;
            color: #4f6f84;
            text-align: center;
            line-height: 1.6;
        }
        .footer .org-logos {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 0.8rem 1.5rem;
            margin: 0.6rem 0 0.2rem;
        }
        .footer .org-logos img {
            height: 32px;
            width: auto;
            opacity: 0.85;
        }
        .footer .org-logos .ihci-logo {
            height: 38px;
        }
        .footer a {
            color: #1a5f82;
            text-decoration: none;
            font-weight: 600;
        }
        .footer a:hover {
            text-decoration: underline;
        }
        .footer .credits {
            margin-top: 0.3rem;
        }
        @media (max-width: 600px) {
            .app-container { padding: 1.2rem; }
            .header h1 { font-size: 1.2rem; }
            .quiz-progress { padding: 0.3rem 1rem; }
            .answers label { font-size: 0.9rem; padding: 0.4rem 0.8rem; }
            .btn { padding: 0.4rem 1.2rem; font-size: 0.8rem; }
        }
    </style>
</head>
<body>

<div class="app-container">
    <!-- header -->
    <div class="header">
        <img src="https://www.who.int/images/default-source/fallback/header-logos/h-logo-blue.svg?sfvrsn=aaed4f35_18" alt="WHO logo" />
        <h1>COVID-19 &amp; Health Services</h1>
        <span class="badge">IHCI · 7 questions</span>
    </div>

    <!-- progress -->
    <div class="quiz-progress">
        <span class="counter">📌 Question <strong id="qCounter">1</strong> / <span id="totalQ">7</span></span>
        <span class="status-badge" id="statusBadge">⬜ Not answered</span>
    </div>

    <!-- quiz container -->
    <div id="quizContainer" class="quiz-container"></div>

    <!-- navigation -->
    <div class="nav-buttons">
        <button class="btn" id="prevBtn" disabled>← Previous</button>
        <button class="btn" id="nextBtn">Next →</button>
        <button class="btn btn-success" id="submitBtn" style="display:none;">📊 Submit Quiz</button>
        <button class="btn btn-primary" id="resetBtn" style="margin-left:auto;">⟳ Reset</button>
    </div>

    <!-- results -->
    <div class="results-box" id="resultsBox">
        <span id="resultsText">You scored <span class="score-highlight">0</span> out of <span id="totalQResult">7</span></span>
    </div>

    <!-- footer -->
    <div class="footer">
        <div class="org-logos">
            <span style="font-weight:500; color:#1a4058;">In collaboration with</span>
            <img src="https://www.ihci.in/~gitbook/image?url=https%3A%2F%2F4110139307-files.gitbook.io%2F%7E%2Ffiles%2Fv0%2Fb%2Fgitbook-legacy-files%2Fo%2Fspaces%252F-MMHxovP9vC7uvdIVdm8%252Favatar-1605562495454.png%3Fgeneration%3D1605562495815944%26alt%3Dmedia&width=32&dpr=1&quality=100&sign=7eea2677&sv=2" alt="IHCI" class="ihci-logo" />
            <span style="font-size:0.75rem; color:#3a6a7a;">ICMR · MoHFW · State Govts · WHO · Resolve to Save Lives</span>
        </div>
        <div class="credits">
            Quiz by <strong>Rafique</strong> (WHO Wayanad, Kerala) ·
            <a href="callto:+917558845528">📞 Call Rafique</a> ·
            <a href="mailto:cvho.wayanad@ihmi.in?cc=emrafi@yahoo.com&bcc=ihmiwyd@gmail.com&subject=Quiz%20on%20Health%20Services&body=Dear%20Rafique,%0A%0AThanks%20for%20the%20Quiz,%0A%0Afrom">✉️ Suggest a Quiz</a>
        </div>
    </div>
</div>

<script>
    (function() {
        // ----- QUIZ DATA (7 questions from original) -----
        const questions = [
            {
                question: "1. COVID-19 affects provision of health services to:",
                answers: {
                    a: "sexual, and reproductive",
                    b: "maternal, and newborn",
                    c: "child, and adolescent",
                    d: "geriatric, and those with co-morbidities",
                    e: "groups like migrants, PLHIV",
                    f: "all of the above"
                },
                correct: "f"
            },
            {
                question: "2. Essential Health Services is not affected by:",
                answers: {
                    a: "Societal and economic disruption",
                    b: "Proactive HCWs and a responsive community",
                    c: "Pandemic surge leading to diversion of resources",
                    d: "Fear of getting infected from hospital",
                    e: "Fear of being tested and quarantined",
                    f: "Lockdown, and containment measures"
                },
                correct: "b"
            },
            {
                question: "3. Can we sustain Essential Health Services?",
                answers: {
                    a: "Yes",
                    b: "Maybe",
                    c: "Impossible",
                    d: "Difficult",
                    e: "No"
                },
                correct: "a"
            },
            {
                question: "4. Core Essential Health Services includes:",
                answers: {
                    a: "Antenatal care, Intrapartum care",
                    b: "Postnatal, Newborn care and breastfeeding",
                    c: "Child care and feeding, Care of adolescents",
                    d: "SRH: family planning, abortion, gender-violence and HIV services",
                    e: "All of the above",
                    f: "Only b, c, and d"
                },
                correct: "e"
            },
            {
                question: "5. Access to health services and patient flow is not affected by:",
                answers: {
                    a: "Patient is not exposed, or exposed to COVID-19",
                    b: "Need for curfew pass",
                    c: "Mobile medical units providing doorstep service delivery",
                    d: "Protocols for triage, screening and testing",
                    e: "IPC and PPE for HCW, patients and accompanying persons",
                    f: "Dilemma in choosing COVID dedicated vs. normal hospital"
                },
                correct: "c"
            },
            {
                question: "6. Essential Health Services after discharge includes:",
                answers: {
                    a: "Counselling service, including Tele-Counselling",
                    b: "Telemedicine and remote Follow-up",
                    c: "Transport to Home by COVID-19 dedicated vs. normal ambulance",
                    d: "Visits by Field Health staff and community volunteers",
                    e: "All of the above"
                },
                correct: "e"
            },
            {
                question: "7. Disruption of healthcare services does not occur by:",
                answers: {
                    a: "Reorganization of hospitals into COVID hospitals",
                    b: "Diversion of human and financial resources to COVID",
                    c: "Lack of Jobs, and so no money to go to hospital",
                    d: "Establishing alternate methods to provide health services",
                    e: "Lockdown and restrictions, non-availability of transport"
                },
                correct: "d"
            }
        ];

        // ----- state -----
        let currentSlide = 0;
        const userAnswers = {}; // question index -> selected letter
        let quizSubmitted = false;

        // DOM refs
        const container = document.getElementById('quizContainer');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const submitBtn = document.getElementById('submitBtn');
        const resetBtn = document.getElementById('resetBtn');
        const resultsBox = document.getElementById('resultsBox');
        const resultsText = document.getElementById('resultsText');
        const qCounter = document.getElementById('qCounter');
        const totalQ = document.getElementById('totalQ');
        const totalQResult = document.getElementById('totalQResult');
        const statusBadge = document.getElementById('statusBadge');

        totalQ.textContent = questions.length;
        totalQResult.textContent = questions.length;

        // ----- render functions -----
        function renderSlide(index) {
            const q = questions[index];
            if (!q) return;

            let html = `<div class="slide active-slide">`;
            html += `<div class="question">${q.question}</div>`;
            html += `<div class="answers" id="answers-${index}">`;

            const letters = Object.keys(q.answers);
            letters.forEach(letter => {
                const checked = (userAnswers[index] === letter) ? 'checked' : '';
                html += `
                    <label>
                        <input type="radio" name="q${index}" value="${letter}" ${checked} />
                        <span class="letter">${letter}.</span> ${q.answers[letter]}
                    </label>
                `;
            });

            html += `</div></div>`;
            container.innerHTML = html;

            // attach radio change listeners
            const radios = container.querySelectorAll(`input[name="q${index}"]`);
            radios.forEach(radio => {
                radio.addEventListener('change', function() {
                    if (quizSubmitted) return;
                    const val = this.value;
                    userAnswers[index] = val;
                    updateStatus();
                    // remove any highlight from previous check
                    const ansDiv = document.getElementById(`answers-${index}`);
                    if (ansDiv) {
                        ansDiv.classList.remove('correct-highlight', 'wrong-highlight');
                    }
                });
            });

            // update counter
            qCounter.textContent = index + 1;
            updateButtons();
            updateStatus();

            // if quiz already submitted, re-apply highlights
            if (quizSubmitted) {
                highlightAnswers(index);
            }
        }

        function updateButtons() {
            prevBtn.disabled = (currentSlide === 0);
            if (currentSlide === questions.length - 1) {
                nextBtn.style.display = 'none';
                submitBtn.style.display = 'inline-block';
            } else {
                nextBtn.style.display = 'inline-block';
                submitBtn.style.display = 'none';
            }
            // if submitted, disable navigation?
            if (quizSubmitted) {
                prevBtn.disabled = true;
                nextBtn.disabled = true;
                submitBtn.disabled = true;
            } else {
                nextBtn.disabled = false;
                submitBtn.disabled = false;
            }
        }

        function updateStatus() {
            const ans = userAnswers[currentSlide];
            if (ans) {
                statusBadge.textContent = '✅ Answered';
                statusBadge.style.color = '#1a7a4a';
            } else {
                statusBadge.textContent = '⬜ Not answered';
                statusBadge.style.color = '#6a7a8a';
            }
        }

        function highlightAnswers(index) {
            const q = questions[index];
            const ansDiv = document.getElementById(`answers-${index}`);
            if (!ansDiv) return;
            const userAns = userAnswers[index];
            // remove previous classes
            ansDiv.classList.remove('correct-highlight', 'wrong-highlight');

            if (!userAns) {
                // no answer selected, mark as wrong (red) for clarity
                ansDiv.classList.add('wrong-highlight');
                return;
            }

            if (userAns === q.correct) {
                ansDiv.classList.add('correct-highlight');
            } else {
                ansDiv.classList.add('wrong-highlight');
            }
        }

        // ----- navigation -----
        function goToSlide(index) {
            if (quizSubmitted) return;
            if (index < 0 || index >= questions.length) return;
            currentSlide = index;
            renderSlide(currentSlide);
        }

        function nextSlide() {
            if (quizSubmitted) return;
            if (currentSlide < questions.length - 1) {
                goToSlide(currentSlide + 1);
            }
        }

        function prevSlide() {
            if (quizSubmitted) return;
            if (currentSlide > 0) {
                goToSlide(currentSlide - 1);
            }
        }

        // ----- submit -----
        function submitQuiz() {
            if (quizSubmitted) return;

            // check if all questions answered
            let allAnswered = true;
            for (let i = 0; i < questions.length; i++) {
                if (!userAnswers[i]) {
                    allAnswered = false;
                    break;
                }
            }

            if (!allAnswered) {
                // highlight unanswered questions
                for (let i = 0; i < questions.length; i++) {
                    if (!userAnswers[i]) {
                        const ansDiv = document.getElementById(`answers-${i}`);
                        if (ansDiv) {
                            ansDiv.classList.add('wrong-highlight');
                        }
                    }
                }
                // go to first unanswered
                for (let i = 0; i < questions.length; i++) {
                    if (!userAnswers[i]) {
                        goToSlide(i);
                        break;
                    }
                }
                alert('⚠️ Please answer all questions before submitting.');
                return;
            }

            // calculate score
            let correct = 0;
            for (let i = 0; i < questions.length; i++) {
                if (userAnswers[i] === questions[i].correct) {
                    correct++;
                }
                highlightAnswers(i);
            }

            quizSubmitted = true;
            resultsBox.style.display = 'block';
            const total = questions.length;
            let message = `You scored <span class="score-highlight">${correct}</span> out of <span class="score-highlight">${total}</span>`;
            if (correct === total) {
                message += ' 🎉 <span class="perfect">Perfect! Excellent knowledge!</span>';
            } else if (correct >= total * 0.7) {
                message += ' 👍 Good job!';
            } else {
                message += ' 📖 Review the material and try again.';
            }
            resultsText.innerHTML = message;
            submitBtn.style.display = 'none';
            nextBtn.style.display = 'none';
            prevBtn.disabled = true;
            statusBadge.textContent = '🏁 Quiz completed';
            statusBadge.style.color = '#1a5a7a';
        }

        // ----- reset -----
        function resetQuiz() {
            // clear answers
            for (let i = 0; i < questions.length; i++) {
                delete userAnswers[i];
            }
            quizSubmitted = false;
            resultsBox.style.display = 'none';
            submitBtn.style.display = 'none';
            nextBtn.style.display = 'inline-block';
            currentSlide = 0;
            renderSlide(0);
            updateButtons();
            updateStatus();
            // remove highlights
            document.querySelectorAll('.answers').forEach(el => {
                el.classList.remove('correct-highlight', 'wrong-highlight');
            });
            statusBadge.textContent = '⬜ Not answered';
            statusBadge.style.color = '#6a7a8a';
        }

        // ----- event listeners -----
        prevBtn.addEventListener('click', prevSlide);
        nextBtn.addEventListener('click', nextSlide);
        submitBtn.addEventListener('click', submitQuiz);
        resetBtn.addEventListener('click', resetQuiz);

        // keyboard navigation
        document.addEventListener('keydown', function(e) {
            if (e.key === 'ArrowRight' && !quizSubmitted) {
                e.preventDefault();
                nextSlide();
            } else if (e.key === 'ArrowLeft' && !quizSubmitted) {
                e.preventDefault();
                prevSlide();
            }
        });

        // ----- init -----
        renderSlide(0);
        updateButtons();
        updateStatus();
    })();
</script>

</body>
</html>
